name: CI Scheduled

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - name: Scheduled task
        run: |
          echo "⏰ Scheduled execution at $(date)"
          echo "📊 Generating log data..."
          sleep 2
          echo "✅ Scheduled task completed successfully"
